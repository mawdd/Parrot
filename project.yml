name: Parrot
options:
  bundleIdPrefix: com.uygar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"

targets:
  Parrot:
    type: application
    platform: macOS
    sources:
      - path: Parrot
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uygar.parrot
        PRODUCT_NAME: Parrot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Parrot/Info.plist
        CODE_SIGN_ENTITLEMENTS: Parrot/Parrot.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: WhisperKit
        product: WhisperKit
    entitlements:
      path: Parrot/Parrot.entitlements
    info:
      path: Parrot/Info.plist
